<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lau SemiJoias - Sistema de Gerenciamento</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Montserrat', sans-serif; background: #0a0a0a; color: #ffffff; min-height: 100vh; }
    h1, h2, h3, h4, h5, h6 { font-family: 'Montserrat', sans-serif; }
    .app-container { display: flex; min-height: 100vh; }
    .sidebar { width: 260px; background: linear-gradient(180deg, #111111 0%, #0a0a0a 100%); border-right: 1px solid rgba(201, 168, 76, 0.2); padding: 30px 20px; position: fixed; height: 100vh; overflow-y: auto; z-index: 100; }
    .logo { text-align: center; margin-bottom: 40px; }
    .logo-icon { font-size: 48px; margin-bottom: 10px; }
    .logo-text { font-family: 'Montserrat', sans-serif; font-size: 24px; font-weight: 600; color: #c9a84c; letter-spacing: 2px; }
    .nav-menu { list-style: none; }
    .nav-item { margin-bottom: 8px; }
    .nav-button { width: 100%; display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: transparent; border: 1px solid transparent; border-radius: 12px; color: #cccccc; font-family: 'Montserrat', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.3s ease; }
    .nav-button:hover { background: rgba(201, 168, 76, 0.1); border-color: rgba(201, 168, 76, 0.3); color: #d4bc6a; }
    .nav-button.active { background: linear-gradient(135deg, rgba(201, 168, 76, 0.2) 0%, rgba(201, 168, 76, 0.05) 100%); border-color: #c9a84c; color: #c9a84c; }
    .nav-icon { width: 20px; height: 20px; opacity: 0.8; }
    .main-content { flex: 1; margin-left: 260px; padding: 40px; min-height: 100vh; }
    .page-title { font-size: 32px; font-weight: 600; color: #c9a84c; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid rgba(201, 168, 76, 0.3); }
    .card { background: #1a1a1a; border: 1px solid rgba(201, 168, 76, 0.2); border-radius: 16px; padding: 24px; transition: all 0.3s ease; }
    .card:hover { border-color: #c9a84c; transform: translateY(-2px); box-shadow: 0 10px 40px rgba(201, 168, 76, 0.15); }
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 500; color: #d4bc6a; text-transform: uppercase; letter-spacing: 1px; }
    .form-input, .form-select, .form-textarea { width: 100%; padding: 14px 16px; background: #111111; border: 1px solid rgba(201, 168, 76, 0.3); border-radius: 10px; color: #ffffff; font-family: 'Montserrat', sans-serif; font-size: 14px; transition: all 0.3s ease; }
    .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: #c9a84c; box-shadow: 0 0 20px rgba(201, 168, 76, 0.2); }
    .form-textarea { min-height: 100px; resize: vertical; }
    .form-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
    .btn { padding: 14px 28px; border-radius: 10px; font-family: 'Montserrat', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; border: none; display: inline-flex; align-items: center; gap: 8px; }
    .btn-primary { background: linear-gradient(135deg, #c9a84c 0%, #a08530 100%); color: #0a0a0a; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(201, 168, 76, 0.4); }
    .btn-secondary { background: transparent; border: 1px solid #c9a84c; color: #c9a84c; }
    .btn-secondary:hover { background: rgba(201, 168, 76, 0.1); }
    .btn-danger { background: #f87171; color: #ffffff; }
    .btn-success { background: #4ade80; color: #0a0a0a; }
    .btn-sm { padding: 8px 16px; font-size: 12px; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; }
    .jewelry-card { background: #1a1a1a; border: 1px solid rgba(201, 168, 76, 0.2); border-radius: 16px; padding: 24px; transition: all 0.3s ease; position: relative; overflow: hidden; }
    .jewelry-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #c9a84c, #d4bc6a, #c9a84c); opacity: 0; transition: opacity 0.3s ease; }
    .jewelry-card:hover { border-color: #c9a84c; transform: translateY(-4px); box-shadow: 0 15px 50px rgba(201, 168, 76, 0.2); }
    .jewelry-card:hover::before { opacity: 1; }
    .jewelry-code { display: inline-block; background: linear-gradient(135deg, #c9a84c 0%, #a08530 100%); color: #0a0a0a; padding: 6px 14px; border-radius: 20px; font-weight: 700; font-size: 14px; margin-bottom: 12px; letter-spacing: 1px; }
    .jewelry-name { font-family: 'Montserrat', sans-serif; font-size: 18px; font-weight: 600; margin-bottom: 8px; color: #ffffff; }
    .jewelry-type { font-size: 12px; color: #d4bc6a; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
    .jewelry-description { font-size: 13px; color: #888888; margin-bottom: 16px; line-height: 1.6; }
    .jewelry-price { font-family: 'Montserrat', sans-serif; font-size: 24px; font-weight: 600; color: #c9a84c; margin-bottom: 16px; }
    .jewelry-meta { display: flex; justify-content: space-between; align-items: center; padding-top: 16px; border-top: 1px solid rgba(201, 168, 76, 0.2); }
    .jewelry-material { font-size: 11px; color: #888888; text-transform: uppercase; letter-spacing: 1px; }
    .status-badge { padding: 4px 12px; border-radius: 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
    .status-available { background: rgba(74, 222, 128, 0.2); color: #4ade80; }
    .status-sold { background: rgba(248, 113, 113, 0.2); color: #f87171; }
    .stat-card { background: linear-gradient(135deg, #1a1a1a 0%, #111111 100%); border: 1px solid rgba(201, 168, 76, 0.2); border-radius: 16px; padding: 28px; text-align: center; transition: all 0.3s ease; }
    .stat-card:hover { border-color: #c9a84c; transform: translateY(-4px); }
    .stat-icon { font-size: 32px; margin-bottom: 12px; }
    .stat-value { font-family: 'Montserrat', sans-serif; font-size: 32px; font-weight: 600; color: #c9a84c; margin-bottom: 8px; }
    .stat-label { font-size: 12px; color: #888888; text-transform: uppercase; letter-spacing: 1px; }
    .chart-container { background: #1a1a1a; border: 1px solid rgba(201, 168, 76, 0.2); border-radius: 16px; padding: 24px; margin-top: 30px; }
    .chart-title { font-family: 'Montserrat', sans-serif; font-size: 18px; color: #c9a84c; margin-bottom: 20px; }
    .chart-bars { display: flex; align-items: flex-end; justify-content: space-around; height: 200px; padding: 20px 0; }
    .chart-bar { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .bar { width: 50px; background: linear-gradient(180deg, #c9a84c 0%, #a08530 100%); border-radius: 8px 8px 0 0; transition: all 0.3s ease; }
    .bar:hover { opacity: 0.8; transform: scaleY(1.05); }
    .bar-label { font-size: 12px; color: #888888; }
    .cart-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.8); z-index: 200; display: flex; justify-content: flex-end; }
    .cart-sidebar { width: 420px; background: #111111; border-left: 1px solid rgba(201, 168, 76, 0.3); padding: 30px; display: flex; flex-direction: column; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .cart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid rgba(201, 168, 76, 0.2); }
    .cart-title { font-family: 'Montserrat', sans-serif; font-size: 24px; color: #c9a84c; }
    .cart-close { background: transparent; border: none; color: #888888; font-size: 24px; cursor: pointer; transition: color 0.3s ease; }
    .cart-close:hover { color: #c9a84c; }
    .cart-items { flex: 1; overflow-y: auto; margin-bottom: 20px; }
    .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 16px; background: #1a1a1a; border-radius: 10px; margin-bottom: 12px; border: 1px solid rgba(201, 168, 76, 0.1); }
    .cart-item-info { flex: 1; }
    .cart-item-code { font-weight: 600; color: #c9a84c; font-size: 14px; }
    .cart-item-name { font-size: 13px; color: #cccccc; }
    .cart-item-price { font-weight: 600; color: #ffffff; }
    .cart-item-remove { background: transparent; border: none; color: #f87171; cursor: pointer; padding: 4px 8px; font-size: 18px; transition: all 0.3s ease; }
    .cart-item-remove:hover { transform: scale(1.2); }
    .cart-summary { background: #1a1a1a; border-radius: 12px; padding: 20px; border: 1px solid rgba(201, 168, 76, 0.2); }
    .cart-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 14px; }
    .cart-row.total { font-size: 18px; font-weight: 600; color: #c9a84c; padding-top: 12px; border-top: 1px solid rgba(201, 168, 76, 0.2); }
    .discount-section { margin: 20px 0; padding: 16px; background: #1a1a1a; border-radius: 10px; border: 1px solid rgba(201, 168, 76, 0.2); }
    .discount-tabs { display: flex; gap: 8px; margin-bottom: 12px; }
    .discount-tab { flex: 1; padding: 10px; background: transparent; border: 1px solid rgba(201, 168, 76, 0.3); border-radius: 8px; color: #cccccc; font-size: 13px; cursor: pointer; transition: all 0.3s ease; text-align: center; }
    .discount-tab.active { background: rgba(201, 168, 76, 0.2); border-color: #c9a84c; color: #c9a84c; }
    .filters-bar { display: flex; gap: 16px; margin-bottom: 30px; flex-wrap: wrap; }
    .filter-select { padding: 12px 20px; background: #1a1a1a; border: 1px solid rgba(201, 168, 76, 0.3); border-radius: 10px; color: #ffffff; font-size: 14px; cursor: pointer; min-width: 180px; }
    .filter-select:focus { outline: none; border-color: #c9a84c; }
    .search-box { position: relative; margin-bottom: 30px; }
    .search-input { width: 100%; padding: 16px 20px 16px 50px; background: #1a1a1a; border: 1px solid rgba(201, 168, 76, 0.3); border-radius: 12px; color: #ffffff; font-size: 16px; transition: all 0.3s ease; }
    .search-input:focus { outline: none; border-color: #c9a84c; box-shadow: 0 0 30px rgba(201, 168, 76, 0.15); }
    .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #888888; font-size: 20px; }
    .search-result { background: #1a1a1a; border: 1px solid rgba(201, 168, 76, 0.3); border-radius: 12px; padding: 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
    .search-result-info { flex: 1; }
    .search-result-code { color: #c9a84c; font-weight: 600; margin-bottom: 4px; }
    .search-result-name { font-size: 16px; margin-bottom: 4px; }
    .search-result-price { font-family: 'Montserrat', sans-serif; font-size: 20px; color: #c9a84c; }
    .sales-history { margin-top: 30px; }
    .sales-list { background: #1a1a1a; border: 1px solid rgba(201, 168, 76, 0.2); border-radius: 12px; overflow: hidden; }
    .sale-item { padding: 20px; border-bottom: 1px solid rgba(201, 168, 76, 0.1); display: flex; justify-content: space-between; align-items: center; transition: background 0.3s ease; }
    .sale-item:hover { background: rgba(201, 168, 76, 0.05); }
    .sale-item:last-child { border-bottom: none; }
    .sale-info { flex: 1; }
    .sale-customer { font-weight: 600; margin-bottom: 4px; }
    .sale-date { font-size: 12px; color: #888888; }
    .sale-total { font-family: 'Montserrat', sans-serif; font-size: 20px; font-weight: 600; color: #c9a84c; }
    .empty-state { text-align: center; padding: 60px 20px; color: #888888; }
    .empty-icon { font-size: 64px; margin-bottom: 20px; opacity: 0.5; }
    .empty-title { font-family: 'Montserrat', sans-serif; font-size: 20px; margin-bottom: 10px; color: #d4bc6a; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.5s ease; }
    @media (max-width: 1024px) { .sidebar { width: 200px; } .main-content { margin-left: 200px; padding: 20px; } .grid-3, .grid-4 { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 768px) { .sidebar { width: 100%; height: auto; position: relative; border-right: none; border-bottom: 1px solid rgba(201, 168, 76, 0.2); } .main-content { margin-left: 0; } .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; } .form-row { grid-template-columns: 1fr; } .cart-sidebar { width: 100%; } }
    .toast { position: fixed; bottom: 30px; right: 30px; background: #1a1a1a; border: 1px solid rgba(201, 168, 76, 0.3); border-radius: 12px; padding: 16px 24px; display: flex; align-items: center; gap: 12px; z-index: 400; animation: slideInRight 0.3s ease; }
    @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .toast-success { border-left: 3px solid #4ade80; }
    .toast-error { border-left: 3px solid #f87171; }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;">
      <div class="loading-icon" style="font-size:64px;margin-bottom:20px;animation:pulse 2s ease infinite;">💎</div>
      <div class="loading-text" style="font-family:'Playfair Display',serif;font-size:24px;letter-spacing:2px;color:#c9a84c;">LAU SEMIJOIAS</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useContext, createContext } = React;

    const COLORS = { bg: '#0a0a0a', bgSecondary: '#111111', bgCard: '#1a1a1a', gold: '#c9a84c', goldLight: '#d4bc6a', goldDark: '#a08530', white: '#ffffff', gray: '#888888', grayLight: '#cccccc', success: '#4ade80', danger: '#f87171' };

    const JEWELRY_TYPES = { BRINCO: { code: 'B', label: 'Brinco' }, COLAR: { code: 'C', label: 'Colar' }, ANEL: { code: 'A', label: 'Anel' }, PULSEIRA: { code: 'P', label: 'Pulseira' }, CONJUNTO: { code: 'S', label: 'Conjunto' }, BRACELETE: { code: 'T', label: 'Bracelete' }, PIERCING: { code: 'G', label: 'Piercing' } };
    const MATERIALS = ['Prata 925', 'Prata 925 - R', 'Semi Joia'];
    const AppContext = createContext();

    // IndexedDB - Banco de dados do navegador
    const DB_NAME = 'LauSemiJoiasDB';
    const DB_VERSION = 1;

    function openDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onerror = () => reject(request.error);
        request.onsuccess = () => resolve(request.result);
        request.onupgradeneeded = (event) => {
          const db = event.target.result;
          if (!db.objectStoreNames.contains('jewelry')) db.createObjectStore('jewelry', { keyPath: 'id' });
          if (!db.objectStoreNames.contains('sales')) db.createObjectStore('sales', { keyPath: 'id' });
          if (!db.objectStoreNames.contains('deletedCodes')) db.createObjectStore('deletedCodes', { keyPath: 'id', autoIncrement: true });
        };
      });
    }

    function dbGetAll(storeName) {
      return openDB().then(db => {
        return new Promise((resolve, reject) => {
          const tx = db.transaction(storeName, 'readonly');
          const store = tx.objectStore(storeName);
          const request = store.getAll();
          request.onerror = () => reject(request.error);
          request.onsuccess = () => resolve(request.result);
        });
      });
    }

    function dbAdd(storeName, item) {
      return openDB().then(db => {
        return new Promise((resolve, reject) => {
          const tx = db.transaction(storeName, 'readwrite');
          const store = tx.objectStore(storeName);
          const request = store.add(item);
          request.onerror = () => reject(request.error);
          request.onsuccess = () => resolve(item);
        });
      });
    }

    function dbPut(storeName, item) {
      return openDB().then(db => {
        return new Promise((resolve, reject) => {
          const tx = db.transaction(storeName, 'readwrite');
          const store = tx.objectStore(storeName);
          const request = store.put(item);
          request.onerror = () => reject(request.error);
          request.onsuccess = () => resolve(item);
        });
      });
    }

    function dbDelete(storeName, id) {
      return openDB().then(db => {
        return new Promise((resolve, reject) => {
          const tx = db.transaction(storeName, 'readwrite');
          const store = tx.objectStore(storeName);
          const request = store.delete(id);
          request.onerror = () => reject(request.error);
          request.onsuccess = () => resolve();
        });
      });
    }

    function dbClear(storeName) {
      return openDB().then(db => {
        return new Promise((resolve, reject) => {
          const tx = db.transaction(storeName, 'readwrite');
          const store = tx.objectStore(storeName);
          const request = store.clear();
          request.onerror = () => reject(request.error);
          request.onsuccess = () => resolve();
        });
      });
    }

    function AppProvider({ children }) {
      const [jewelry, setJewelry] = useState([]);
      const [sales, setSales] = useState([]);
      const [deletedCodes, setDeletedCodes] = useState([]);
      const [loading, setLoading] = useState(true);

      // Carregar dados do IndexedDB
      useEffect(() => {
        const fetchData = async () => {
          try {
            const [jewelryData, salesData, codesData] = await Promise.all([
              dbGetAll('jewelry'),
              dbGetAll('sales'),
              dbGetAll('deletedCodes')
            ]);
            setJewelry(jewelryData);
            setSales(salesData);
            setDeletedCodes(codesData);
          } catch (error) {
            console.error('Erro ao carregar dados:', error);
          } finally {
            setLoading(false);
          }
        };
        fetchData();
      }, []);

      const getNextCode = (type) => {
        const typeKey = Object.keys(JEWELRY_TYPES).find(k => JEWELRY_TYPES[k].label === type);
        if (!typeKey) return null;
        const prefix = JEWELRY_TYPES[typeKey].code;
        const availableDeleted = deletedCodes.filter(dc => dc.code.startsWith(prefix));
        if (availableDeleted.length > 0) {
          availableDeleted.sort((a, b) => parseInt(a.code.substring(1)) - parseInt(b.code.substring(1)));
          return availableDeleted[0].code;
        }
        const existingCodes = jewelry.filter(j => j.type === type).map(j => j.code).filter(c => c.startsWith(prefix));
        let nextNum = 1;
        while (existingCodes.includes(`${prefix}${String(nextNum).padStart(2, '0')}`)) nextNum++;
        return `${prefix}${String(nextNum).padStart(2, '0')}`;
      };

      const addJewelry = async (data) => {
        const code = getNextCode(data.type);
        const newItem = { ...data, code, id: Date.now().toString(), status: 'available', createdAt: new Date().toISOString() };
        try {
          await dbAdd('jewelry', newItem);
          setJewelry(prev => [...prev, newItem]);
          return newItem;
        } catch (error) {
          console.error('Erro ao adicionar joia:', error);
          setJewelry(prev => [...prev, newItem]);
          return newItem;
        }
      };

      const updateJewelry = async (id, data) => {
        try {
          const updated = { ...data, id };
          await dbPut('jewelry', updated);
          setJewelry(prev => prev.map(item => item.id === id ? { ...item, ...data } : item));
        } catch (error) {
          console.error('Erro ao atualizar joia:', error);
          setJewelry(prev => prev.map(item => item.id === id ? { ...item, ...data } : item));
        }
      };

      const deleteJewelry = async (id) => {
        const item = jewelry.find(j => j.id === id);
        if (item) {
          try {
            await dbDelete('jewelry', id);
            await dbAdd('deletedCodes', { code: item.code, type: item.type });
            setDeletedCodes(prev => [...prev, { code: item.code, type: item.type }]);
            setJewelry(prev => prev.filter(j => j.id !== id));
          } catch (error) {
            console.error('Erro ao excluir joia:', error);
            setDeletedCodes(prev => [...prev, { code: item.code, type: item.type }]);
            setJewelry(prev => prev.filter(j => j.id !== id));
          }
        }
      };

      const markAsSold = (id) => updateJewelry(id, { status: 'sold' });
      const markAsAvailable = (id) => updateJewelry(id, { status: 'available' });

      const addSale = async (saleData) => {
        try {
          const jewelryItems = saleData.items.map(item => {
            const j = jewelry.find(jwl => jwl.id === item.id);
            return { id: item.id, code: j.code, type: j.type };
          });
          await dbAdd('sales', saleData);
          for (const item of jewelryItems) {
            await dbAdd('deletedCodes', { code: item.code, type: item.type });
            await dbDelete('jewelry', item.id);
          }
          setSales(prev => [...prev, saleData]);
          setJewelry(prev => prev.filter(j => !saleData.items.find(i => i.id === j.id)));
        } catch (error) {
          console.error('Erro ao adicionar venda:', error);
          setSales(prev => [...prev, saleData]);
          setJewelry(prev => prev.filter(j => !saleData.items.find(i => i.id === j.id)));
        }
      };

      const getDashboardData = () => {
        const now = new Date();
        const currentMonth = now.getMonth();
        const currentYear = now.getFullYear();
        const monthSales = sales.filter(sale => { const d = new Date(sale.date); return d.getMonth() === currentMonth && d.getFullYear() === currentYear; });
        const totalRevenue = monthSales.reduce((sum, sale) => sum + sale.total, 0);
        const totalItems = monthSales.reduce((sum, sale) => sum + sale.items.length, 0);
        const totalProfit = monthSales.reduce((sum, sale) => sum + (sale.total - sale.items.reduce((s, i) => s + (i.costPrice || 0), 0)), 0);
        const avgTicket = monthSales.length > 0 ? totalRevenue / monthSales.length : 0;
        const weeks = [[], [], [], []];
        monthSales.forEach(sale => { const weekIndex = Math.floor((new Date(sale.date).getDate() - 1) / 7); if (weekIndex < 4) weeks[weekIndex].push(sale); });
        const weeklySales = weeks.map(week => week.reduce((sum, sale) => sum + sale.total, 0));
        const productCount = {};
        monthSales.forEach(sale => sale.items.forEach(item => { productCount[item.type] = (productCount[item.type] || 0) + 1; }));
        const mostSold = Object.entries(productCount).sort((a, b) => b[1] - a[1]).slice(0, 5).map(([name, count]) => ({ name, count }));
        return { totalRevenue, totalItems, avgTicket, totalProfit, weeklySales, mostSold, totalSales: monthSales.length };
      };

      // Exportar dados para arquivo JSON
      const exportData = () => {
        const data = { jewelry, sales, deletedCodes };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `lau-semijoias-backup-${new Date().toISOString().split('T')[0]}.json`;
        a.click();
        URL.revokeObjectURL(url);
      };

      // Importar dados de arquivo JSON
      const importData = (file) => {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = async (e) => {
            try {
              const data = JSON.parse(e.target.result);
              await dbClear('jewelry');
              await dbClear('sales');
              await dbClear('deletedCodes');

              for (const item of (data.jewelry || [])) await dbAdd('jewelry', item);
              for (const sale of (data.sales || [])) await dbAdd('sales', sale);
              for (const code of (data.deletedCodes || [])) await dbAdd('deletedCodes', code);

              setJewelry(data.jewelry || []);
              setSales(data.sales || []);
              setDeletedCodes(data.deletedCodes || []);
              resolve();
            } catch (error) {
              reject(error);
            }
          };
          reader.onerror = () => reject(reader.error);
          reader.readAsText(file);
        });
      };

      const value = { jewelry, sales, addJewelry, updateJewelry, deleteJewelry, markAsSold, markAsAvailable, addSale, getDashboardData, getNextCode, loading, exportData, importData };
      return <AppContext.Provider value={value}>{children}</AppContext.Provider>;
    }

    function PieChart({ data }) {
      const chartRef = React.useRef(null);
      const chartInstanceRef = React.useRef(null);

      useEffect(() => {
        if (!chartRef.current) return;

        const ctx = chartRef.current.getContext('2d');

        // Cores elegantes em tons de dourado e neutros
        const colors = [
          '#c9a84c', '#d4bc6a', '#a08530', '#e8d68a', '#8b7322',
          '#f5e6b8', '#6b5d1a', '#d4c47a', '#a6933d', '#f0e090'
        ];

        if (chartInstanceRef.current) {
          chartInstanceRef.current.destroy();
        }

        chartInstanceRef.current = new Chart(ctx, {
          type: 'pie',
          data: {
            labels: data.map(item => item.name),
            datasets: [{
              data: data.map(item => item.count),
              backgroundColor: colors.slice(0, data.length),
              borderColor: '#1a1a1a',
              borderWidth: 2
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                position: 'right',
                labels: {
                  color: '#cccccc',
                  font: {
                    family: 'Montserrat',
                    size: 12
                  },
                  padding: 15
                }
              },
              tooltip: {
                backgroundColor: '#1a1a1a',
                titleColor: '#c9a84c',
                bodyColor: '#cccccc',
                borderColor: '#c9a84c',
                borderWidth: 1,
                titleFont: { family: 'Playfair Display', size: 14 },
                bodyFont: { family: 'Montserrat', size: 12 },
                callbacks: {
                  label: function(context) {
                    const label = context.label || '';
                    const value = context.parsed || 0;
                    const total = context.dataset.data.reduce((a, b) => a + b, 0);
                    const percentage = ((value / total) * 100).toFixed(1);
                    return `${label}: ${value} vendas (${percentage}%)`;
                  }
                }
              }
            }
          }
        });

        return () => {
          if (chartInstanceRef.current) {
            chartInstanceRef.current.destroy();
          }
        };
      }, [data]);

      return <canvas ref={chartRef} />;
    }

      return (
        <div>
          {toast && <Toast {...toast} onClose={() => setToast(null)} />}
          <h1 className="page-title">Vendas</h1>
          <div className="search-box">
            <span className="search-icon">🔍</span>
            <input type="text" className="search-input" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} placeholder="Busque por código (ex: B01) ou nome da joia..." />
          </div>
          {searchResults.length > 0 && (
            <div className="grid-3" style={{ marginBottom: 30 }}>
              {searchResults.map(item => (
                <div key={item.id} className="search-result fade-in">
                  <div className="search-result-info"><div className="search-result-code">{item.code}</div><div className="search-result-name">{item.name}</div><div className="search-result-price">{formatPrice(item.sellPrice)}</div></div>
                  <button className="btn btn-primary btn-sm" onClick={() => addToCart(item)}>+ Adicionar</button>
                </div>
              ))}
            </div>
          )}
          {searchTerm && searchResults.length === 0 && (
            <div className="empty-state"><div className="empty-icon">🔍</div><div className="empty-title">Nenhum produto encontrado</div><p>Tente buscar por outro código ou nome</p></div>
          )}
          <div style={{ textAlign: 'center', marginTop: 40 }}>
            <button className="btn btn-secondary" onClick={() => setIsCartOpen(true)} style={{ position: 'relative' }}>🛒 Ver Carrinho ({cart.length})</button>
          </div>
          <CartSidebar isOpen={isCartOpen} onClose={() => setIsCartOpen(false)} cart={cart} onRemoveItem={removeFromCart} onCheckout={handleCheckout} customerName={customerName} setCustomerName={setCustomerName} discountType={discountType} setDiscountType={setDiscountType} discountValue={discountValue} setDiscountValue={setDiscountValue} paymentMethod={paymentMethod} setPaymentMethod={setPaymentMethod} installments={installments} setInstallments={setInstallments} />
        </div>
      );
    }

    function SettingsPage() {
      const { exportData, importData } = useApp();
      const [toast, setToast] = useState(null);
      const [importing, setImporting] = useState(false);

      const handleExport = () => {
        exportData();
        setToast({ message: 'Dados exportados com sucesso!', type: 'success' });
      };

      const handleImport = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setImporting(true);
        importData(file)
          .then(() => {
            setToast({ message: 'Dados importados com sucesso!', type: 'success' });
            setImporting(false);
          })
          .catch(err => {
            setToast({ message: 'Erro ao importar dados: ' + err.message, type: 'error' });
            setImporting(false);
          });
      };

      return (
        <div>
          {toast && <Toast {...toast} onClose={() => setToast(null)} />}
          <h1 className="page-title">Configurações</h1>
          <div className="grid-2">
            <div className="card">
              <h3 style={{ color: '#c9a84c', marginBottom: 16 }}>📤 Exportar Dados</h3>
              <p style={{ color: '#888888', marginBottom: 20, fontSize: 14 }}>
                Baixe um arquivo com todos os dados (joias, vendas e códigos) para backup ou para migrar para outro computador.
              </p>
              <button className="btn btn-primary" onClick={handleExport}>Exportar Dados</button>
            </div>
            <div className="card">
              <h3 style={{ color: '#c9a84c', marginBottom: 16 }}>📥 Importar Dados</h3>
              <p style={{ color: '#888888', marginBottom: 20, fontSize: 14 }}>
                Carregue um arquivo de backup para restaurar os dados. <strong>Atenção:</strong> isso substituirá todos os dados atuais.
              </p>
              <label className="btn btn-secondary" style={{ cursor: 'pointer' }}>
                {importing ? 'Importando...' : 'Importar Dados'}
                <input type="file" accept=".json" onChange={handleImport} style={{ display: 'none' }} disabled={importing} />
              </label>
            </div>
          </div>
          <div className="card" style={{ marginTop: 24 }}>
            <h3 style={{ color: '#c9a84c', marginBottom: 16 }}>ℹ️ Sobre</h3>
            <p style={{ color: '#888888', fontSize: 14, lineHeight: 1.8 }}>
              <strong>Lau SemiJoias</strong> - Sistema de Gerenciamento<br />
              Versão: 1.0.0<br />
              Os dados são salvos automaticamente no navegador deste computador.<br />
              Para usar em outro computador, exporte os dados aqui e importe no novo navegador.
            </p>
          </div>
        </div>
      );
    }

    function AppContent() {
      const [currentPage, setCurrentPage] = useState('register');
      const renderPage = () => {
        switch (currentPage) {
          case 'register': return <RegisterPage />;
          case 'inventory': return <InventoryPage />;
          case 'dashboard': return <DashboardPage />;
          case 'sales': return <SalesPage />;
          case 'settings': return <SettingsPage />;
          default: return <RegisterPage />;
        }
      };
      return (
        <div className="app-container">
          <Sidebar currentPage={currentPage} onNavigate={setCurrentPage} />
          <main className="main-content">{renderPage()}</main>
        </div>
      );
    }

    function App() {
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        // Simular loading inicial para carregar dados do banco
        const timer = setTimeout(() => setLoading(false), 500);
        return () => clearTimeout(timer);
      }, []);

      if (loading) {
        return (
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: '100vh', background: '#0a0a0a' }}>
            <div style={{ textAlign: 'center' }}>
              <div style={{ fontSize: '64px', marginBottom: '20px', animation: 'pulse 2s ease infinite' }}>💎</div>
              <div style={{ fontFamily: 'Montserrat', fontSize: '24px', letterSpacing: '2px', color: '#c9a84c' }}>LAU SEMIJOIAS</div>
              <div style={{ marginTop: '20px', color: '#888888' }}>Carregando...</div>
            </div>
          </div>
        );
      }

      return (
        <AppProvider>
          <AppContent />
        </AppProvider>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
